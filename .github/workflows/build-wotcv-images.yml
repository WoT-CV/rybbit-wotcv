name: Build WoT-CV Images

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: wotcv-images-${{ github.ref }}
  cancel-in-progress: true

env:
  BACKEND_IMAGE: ghcr.io/wot-cv/rybbit-wotcv-backend
  CLIENT_IMAGE: ghcr.io/wot-cv/rybbit-wotcv-client
  IMAGE_TAG: sha-${{ github.sha }}

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build-meta
        run: echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: mode=max
          sbom: true
          tags: ${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}
          build-args: |
            WOTCV_GIT_SHA=${{ github.sha }}
            WOTCV_IMAGE_TAG=${{ env.IMAGE_TAG }}
            WOTCV_BUILD_TIME=${{ steps.build-meta.outputs.build_time }}
      - name: Publish backend digest
        run: |
          echo "### Backend image" >> "$GITHUB_STEP_SUMMARY"
          echo '`${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}`' >> "$GITHUB_STEP_SUMMARY"
          echo 'Digest: `${{ steps.build.outputs.digest }}`' >> "$GITHUB_STEP_SUMMARY"

  client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build-meta
        run: echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./client/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: mode=max
          sbom: true
          tags: ${{ env.CLIENT_IMAGE }}:${{ env.IMAGE_TAG }}
          build-args: |
            NEXT_PUBLIC_BACKEND_URL=${{ vars.WOTCV_BASE_URL }}
            WOTCV_GIT_SHA=${{ github.sha }}
            WOTCV_IMAGE_TAG=${{ env.IMAGE_TAG }}
            WOTCV_BUILD_TIME=${{ steps.build-meta.outputs.build_time }}
      - name: Publish client digest
        run: |
          echo "### Client image" >> "$GITHUB_STEP_SUMMARY"
          echo '`${{ env.CLIENT_IMAGE }}:${{ env.IMAGE_TAG }}`' >> "$GITHUB_STEP_SUMMARY"
          echo 'Digest: `${{ steps.build.outputs.digest }}`' >> "$GITHUB_STEP_SUMMARY"
