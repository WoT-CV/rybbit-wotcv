name: Build WoT-CV Images

on:
  push:
    branches: [master, feat/wotcv]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: wotcv-images-${{ github.ref }}
  cancel-in-progress: true

env:
  BACKEND_IMAGE: ghcr.io/wot-cv/rybbit-wotcv-backend
  CLIENT_IMAGE: ghcr.io/wot-cv/rybbit-wotcv-client
  IMAGE_TAG: sha-${{ github.sha }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            shared/package-lock.json
            server/package-lock.json
            client/package-lock.json
      - name: Build shared contracts
        working-directory: shared
        run: npm ci && npm run build
      - name: Verify generated tracker artifacts
        working-directory: server
        run: npm ci --legacy-peer-deps && npm run test:run && npm run db:check && npm run check:analytics
      - name: Verify WoT-CV client code
        working-directory: client
        run: npm ci --legacy-peer-deps && npm run test:run && npm run lint:wotcv && npm run knip && npm run audit:polish && npx tsc --noEmit
      - name: Verify merged Compose configuration
        env:
          BASE_URL: https://tracking.example.com
          BETTER_AUTH_SECRET: compose-validation-only
          DEPLOYMENT: self-hosted
          DISABLE_SIGNUP: "true"
          DISABLE_TELEMETRY: "true"
          IMAGE_TAG: sha-${{ github.sha }}
          LITE_DASHBOARD: "false"
          WOTCV_BUILD_TIME: "1970-01-01T00:00:00Z"
          WOTCV_GIT_SHA: ${{ github.sha }}
        run: >-
          docker compose
          -f docker-compose.yml
          -f docker-compose.wotcv.yml
          -f docker-compose.wotcv.branch-build.yml
          config --quiet

  backend:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build-meta
        run: echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: mode=max
          sbom: true
          tags: ${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}
          build-args: |
            WOTCV_GIT_SHA=${{ github.sha }}
            WOTCV_IMAGE_TAG=${{ env.IMAGE_TAG }}
            WOTCV_BUILD_TIME=${{ steps.build-meta.outputs.build_time }}
      - name: Publish backend digest
        run: |
          echo "### Backend image" >> "$GITHUB_STEP_SUMMARY"
          echo '`${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}`' >> "$GITHUB_STEP_SUMMARY"
          echo 'Digest: `${{ steps.build.outputs.digest }}`' >> "$GITHUB_STEP_SUMMARY"

  client:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build-meta
        run: echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./client/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: mode=max
          sbom: true
          tags: ${{ env.CLIENT_IMAGE }}:${{ env.IMAGE_TAG }}
          build-args: |
            NEXT_PUBLIC_BACKEND_URL=${{ vars.WOTCV_BASE_URL }}
            WOTCV_GIT_SHA=${{ github.sha }}
            WOTCV_IMAGE_TAG=${{ env.IMAGE_TAG }}
            WOTCV_BUILD_TIME=${{ steps.build-meta.outputs.build_time }}
      - name: Publish client digest
        run: |
          echo "### Client image" >> "$GITHUB_STEP_SUMMARY"
          echo '`${{ env.CLIENT_IMAGE }}:${{ env.IMAGE_TAG }}`' >> "$GITHUB_STEP_SUMMARY"
          echo 'Digest: `${{ steps.build.outputs.digest }}`' >> "$GITHUB_STEP_SUMMARY"
